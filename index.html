<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>EuroTrip — Guide & GF</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">✈ EuroTrip</div>
    <div class="topbar-sub">Guide & Girlfriend · UK Base</div>
  </div>
  <button class="topbar-btn" onclick="openModal()">+</button>
</div>

<div class="scroll-wrap">

  <div class="panel active" id="panel-home">
    <div id="hero-wrap"></div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Trips</div><div class="stat-value" id="s-trips">0</div></div>
      <div class="stat-card"><div class="stat-label">Wishlist</div><div class="stat-value" id="s-wish">0</div></div>
      <div class="stat-card"><div class="stat-label">Countries</div><div class="stat-value" id="s-countries">0</div></div>
      <div class="stat-card"><div class="stat-label">Budget</div><div class="stat-value" id="s-budget">£0</div></div>
    </div>

    <div class="card">
      <div class="section-title">Budget breakdown</div>
      <div class="chart-wrap"><canvas id="budgetChart"></canvas></div>
      <div id="chart-legend"></div>
    </div>

    <div class="card">
      <div class="section-title">Wishlist</div>
      <div id="dash-wish-preview"></div>
    </div>

    <div class="section-title">Recommended</div>
    <div class="dest-scroll" id="dash-recs"></div>
  </div>

  <div class="panel" id="panel-dest">
    <input id="dest-search" oninput="renderDestGrid()" placeholder="Search..."/>

    <div class="chip-row">
      <div class="chip active" onclick="setDestFilter(this,'all')">All</div>
      <div class="chip" onclick="setDestFilter(this,'spring')">Spring</div>
      <div class="chip" onclick="setDestFilter(this,'summer')">Summer</div>
      <div class="chip" onclick="setDestFilter(this,'autumn')">Autumn</div>
      <div class="chip" onclick="setDestFilter(this,'winter')">Winter</div>
    </div>

    <div class="dest-full-grid" id="dest-grid"></div>

    <div>
      <button onclick="clearSel()">Clear</button>
      <button onclick="saveWishlist()">Save wishlist</button>
    </div>
  </div>

  <div class="panel" id="panel-trips">
    <div id="trips-list"></div>
  </div>

  <div class="panel" id="panel-wish">
    <div id="wish-list"></div>
  </div>

  <div class="panel" id="panel-pack">
    <div id="pack-body"></div>
  </div>

</div>

<!-- TAB -->
<div class="tabbar">
  <div onclick="showTab('home')">Home</div>
  <div onclick="showTab('dest')">Explore</div>
  <div onclick="showTab('trips')">Trips</div>
  <div onclick="showTab('wish')">Wish</div>
  <div onclick="showTab('pack')">Pack</div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <input id="f-dest" placeholder="Destination"/>
    <input id="f-flag" placeholder="Flag"/>
    <input id="f-from" type="date"/>
    <input id="f-to" type="date"/>
    <input id="f-budget" type="number"/>
    <select id="f-season">
      <option value="spring">Spring</option>
      <option value="summer">Summer</option>
      <option value="autumn">Autumn</option>
      <option value="winter">Winter</option>
    </select>
    <input id="f-notes" placeholder="Notes"/>

    <button onclick="saveTrip()">Save</button>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script src="script.js"></script>
</body>
</html>
