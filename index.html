<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EuroTrip — Guide & GF</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <div>
      <div class="topbar-title">✈ EuroTrip</div>
      <div class="topbar-sub">Guide & Girlfriend</div>
    </div>
    <button class="btn" onclick="openTripModal()">+ Add Trip</button>
  </div>

  <div class="tabbar">
    <button onclick="showTab('home')">Home</button>
    <button onclick="showTab('explore')">Explore</button>
    <button onclick="showTab('trips')">Trips</button>
    <button onclick="showTab('pack')">Pack</button>
  </div>

  <div id="home" class="panel active">
    <h2>Dashboard</h2>
    <div id="trip-stats"></div>
  </div>

  <div id="explore" class="panel">
    <h2>Explore Destinations</h2>
    <div id="dest-grid" class="grid"></div>
  </div>

  <div id="trips" class="panel">
    <h2>My Trips</h2>
    <div id="trips-list"></div>
  </div>

  <div id="pack" class="panel">
    <h2>Packing List</h2>
    <div id="pack-list"></div>
  </div>

  <!-- places popup -->
  <div id="place-modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="place-title">Places</h3>
      <div id="place-list"></div>
      <button class="btn" onclick="closePlaceModal()">Close</button>
    </div>
  </div>

  <!-- add trip popup -->
  <div id="trip-modal" class="modal hidden">
    <div class="modal-card">
      <h3>Add Trip</h3>
      <input id="trip-dest" placeholder="Destination" />
      <input id="trip-date" type="date" />
      <input id="trip-budget" type="number" placeholder="Budget" />
      <button class="btn" onclick="saveTrip()">Save</button>
      <button class="btn ghost" onclick="closeTripModal()">Cancel</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
