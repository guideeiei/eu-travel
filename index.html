<!DOCTYPE html>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">✈ EuroTrip</div>
    <div class="topbar-sub">Guide & Girlfriend · UK Base</div>
  </div>
  <button class="topbar-btn" onclick="openModal()">+</button>
</div>

<div class="scroll-wrap">
  <div class="panel active" id="panel-home">
    <div id="hero-wrap"></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Trips</div><div class="stat-value" id="s-trips">0</div></div>
      <div class="stat-card"><div class="stat-label">Wishlist</div><div class="stat-value" id="s-wish">0</div></div>
      <div class="stat-card"><div class="stat-label">Countries</div><div class="stat-value" id="s-countries">0</div></div>
      <div class="stat-card"><div class="stat-label">Budget</div><div class="stat-value" id="s-budget">£0</div></div>
    </div>

    <div class="card">
      <div class="section-title">Recommended from UK</div>
      <div class="dest-scroll" id="dash-recs"></div>
    </div>
  </div>

  <div class="panel" id="panel-dest">
    <div class="dest-full-grid" id="dest-grid"></div>
  </div>

  <div class="panel" id="panel-trips">
    <div id="trips-list"></div>
  </div>

  <div class="panel" id="panel-wish">
    <div id="wish-list"></div>
  </div>

  <div class="panel" id="panel-pack">
    <div id="pack-body"></div>
  </div>
</div>

<div class="tabbar">
  <div class="tab-item active" id="tab-home" onclick="showTab('home')"><span class="tab-label">Home</span></div>
  <div class="tab-item" id="tab-dest" onclick="showTab('dest')"><span class="tab-label">Explore</span></div>
  <div class="tab-item" id="tab-trips" onclick="showTab('trips')"><span class="tab-label">Trips</span></div>
  <div class="tab-item" id="tab-wish" onclick="showTab('wish')"><span class="tab-label">Wishlist</span></div>
  <div class="tab-item" id="tab-pack" onclick="showTab('pack')"><span class="tab-label">Pack</span></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <input class="form-input" type="text" id="f-dest" placeholder="Destination"/>
    <input class="form-input" type="text" id="f-flag" placeholder="🇫🇷"/>
    <input class="form-input" type="date" id="f-from"/>
    <input class="form-input" type="date" id="f-to"/>
    <input class="form-input" type="number" id="f-budget" placeholder="500"/>
    <input class="form-input" type="text" id="f-notes" placeholder="Notes"/>
    <select class="form-select" id="f-season">
      <option value="spring">Spring</option>
      <option value="summer">Summer</option>
      <option value="autumn">Autumn</option>
      <option value="winter">Winter</option>
    </select>
    <button onclick="saveTrip()">Save trip</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg">Saved!</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="script.js"></script>
</body>
</html>
