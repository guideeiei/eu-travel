<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EuroTrip</title>

  <link rel="stylesheet" href="styles.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="topbar-title">✈ EuroTrip</div>
      <div class="topbar-sub">Guide & Girlfriend · UK Base</div>
    </div>
    <button class="topbar-btn" onclick="openModal()">+</button>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-wrap">

    <div class="panel active" id="panel-home">
      <div id="hero-wrap"></div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Trips</div>
          <div class="stat-value" id="s-trips">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Wishlist</div>
          <div class="stat-value" id="s-wish">0</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Recommended</div>
        <div class="dest-scroll" id="dash-recs"></div>
      </div>
    </div>

    <div class="panel" id="panel-dest">
      <div class="dest-full-grid" id="dest-grid"></div>
    </div>

    <div class="panel" id="panel-trips">
      <div id="trips-list"></div>
    </div>

    <div class="panel" id="panel-wish">
      <div id="wish-list"></div>
    </div>

    <div class="panel" id="panel-pack">
      <div id="pack-body"></div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tabbar">
    <div class="tab-item active" onclick="showTab('home')">Home</div>
    <div class="tab-item" onclick="showTab('dest')">Explore</div>
    <div class="tab-item" onclick="showTab('trips')">Trips</div>
    <div class="tab-item" onclick="showTab('wish')">Wishlist</div>
    <div class="tab-item" onclick="showTab('pack')">Pack</div>
  </div>

  <script src="script.js"></script> </body> </html>
