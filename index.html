<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EuroTrip</title>

<link rel="stylesheet" href="css/style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">✈ EuroTrip</div>
    <div class="topbar-sub">Guide & Girlfriend · UK Base</div>
  </div>
  <button class="topbar-btn" onclick="openModal()">+</button>
</div>

<div class="scroll-wrap">

  <!-- HOME -->
  <div class="panel active" id="panel-home">
    <div id="hero-wrap"></div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Trips</div><div class="stat-value" id="s-trips">0</div></div>
      <div class="stat-card"><div class="stat-label">Wishlist</div><div class="stat-value" id="s-wish">0</div></div>
      <div class="stat-card"><div class="stat-label">Countries</div><div class="stat-value" id="s-countries">0</div></div>
      <div class="stat-card"><div class="stat-label">Budget</div><div class="stat-value" id="s-budget">£0</div></div>
    </div>

    <canvas id="budgetChart"></canvas>

    <div id="dash-wish-preview"></div>
    <div id="dash-recs"></div>
  </div>

  <!-- DEST -->
  <div class="panel" id="panel-dest">
    <input id="dest-search" oninput="renderDestGrid()"/>
    <div id="dest-grid"></div>
    <button onclick="saveWishlist()">Save</button>
  </div>

  <!-- TRIPS -->
  <div class="panel" id="panel-trips">
    <div id="trips-list"></div>
  </div>

  <!-- WISHLIST -->
  <div class="panel" id="panel-wish">
    <div id="wish-list"></div>
  </div>

  <!-- PACK -->
  <div class="panel" id="panel-pack">
    <div id="pack-body"></div>
  </div>

</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab-item active" id="tab-home" onclick="showTab('home')">Home</div>
  <div class="tab-item" id="tab-dest" onclick="showTab('dest')">Explore</div>
  <div class="tab-item" id="tab-trips" onclick="showTab('trips')">Trips</div>
  <div class="tab-item" id="tab-wish" onclick="showTab('wish')">Wish</div>
  <div class="tab-item" id="tab-pack" onclick="showTab('pack')">Pack</div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <input id="f-dest"/>
    <input id="f-flag"/>
    <input id="f-from" type="date"/>
    <input id="f-to" type="date"/>
    <input id="f-budget" type="number"/>
    <select id="f-season">
      <option value="summer">summer</option>
      <option value="winter">winter</option>
    </select>
    <input id="f-notes"/>

    <button onclick="saveTrip()">Save</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="js/app.js"></script>

</body>
</html>
